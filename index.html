<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Rommel OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:       #080810;
  --bg2:      #0E0E1A;
  --card:     #12121E;
  --card2:    #16162A;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.12);

  --gold:     #D4A843;
  --gold-dim: rgba(212,168,67,.15);
  --gold-glow:rgba(212,168,67,.35);

  --blue:     #4A9EFF;
  --blue-dim: rgba(74,158,255,.12);
  --purple:   #A78BFA;
  --pink:     #F472B6;
  --emerald:  #34D399;
  --amber:    #FBBF24;
  --orange:   #FB923C;
  --red:      #F87171;
  --slate:    #64748B;

  --txt:      #E8E8F0;
  --txt2:     #8888AA;
  --txt3:     #444460;

  /* activity colours */
  --c-uni:    #4A9EFF;
  --c-study:  #34D399;
  --c-trade:  #FBBF24;
  --c-matrix: #A78BFA;
  --c-content:#F472B6;
  --c-gym:    #FB923C;
  --c-food:   #6EE7B7;
  --c-rest:   #64748B;
  --c-routine:#818CF8;

  --r: 16px;
  --r-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,.6);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 90px;
}
body.ltr { direction: ltr; }
body.rtl { direction: rtl; }
button { font-family:'Cairo',sans-serif; border:none; cursor:pointer; outline:none; }
input, select, textarea { font-family:'Cairo',sans-serif; outline:none; }
.mono { font-family:'DM Mono',monospace; }

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius:2px; }

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr {
  position: relative;
  padding: 20px 18px 16px;
  background: linear-gradient(180deg, #0D0D1F 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.hdr::before {
  content:'';
  position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 120px;
  background: radial-gradient(ellipse, rgba(212,168,67,.08) 0%, transparent 70%);
  pointer-events: none;
}
.hdr-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold), #8B5A0A);
  border-radius: 10px;
  display: flex; align-items:center; justify-content:center;
  font-size: 20px;
  box-shadow: 0 0 20px var(--gold-glow);
}
.logo-text { font-size: 20px; font-weight: 900; letter-spacing: -.5px; }
.logo-sub  { font-size: 11px; color: var(--txt2); margin-top: 1px; font-family:'DM Mono',monospace; }

.hdr-right { display:flex; gap:8px; align-items:center; }
.date-chip {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 8px 12px;
  text-align: center;
}
.date-chip-day { font-size:13px; font-weight:700; color:var(--gold); }
.date-chip-date{ font-size:10px; color:var(--txt2); font-family:'DM Mono',monospace; margin-top:2px; }

.lang-toggle {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 12px;
  color: var(--txt2);
  font-weight: 700;
  letter-spacing: 1px;
  transition: .2s;
}
.lang-toggle:active { background: var(--card2); color: var(--gold); }

/* Habit row */
.habits-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.habits-row::-webkit-scrollbar { display:none; }
.hab {
  display: flex; align-items:center; gap:5px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size:12px;
  color: var(--txt2);
  white-space: nowrap;
  transition: .2s;
  user-select:none;
}
.hab.done {
  background: rgba(212,168,67,.1);
  border-color: var(--gold);
  color: var(--gold);
}

/* Week progress */
.wk-progress {
  display: flex;
  align-items: center;
  gap: 10px;
}
.wk-bar-wrap {
  flex:1;
  background: rgba(255,255,255,.06);
  border-radius: 4px;
  height: 5px;
  overflow: hidden;
}
.wk-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #FBBF24);
  border-radius:4px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.wk-pct { font-size:12px; color:var(--gold); font-family:'DM Mono',monospace; font-weight:500; min-width:32px; }
.wk-stats { display:flex; gap:14px; margin-top:8px; }
.wk-stat { font-size:11px; color:var(--txt2); }
.wk-stat span { color:var(--txt); font-weight:700; font-family:'DM Mono',monospace; }

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0; left:0; right:0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  backdrop-filter: blur(20px);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 10px 4px;
  gap:4px;
  background: none;
  color: var(--txt3);
  font-size: 10px;
  font-weight: 600;
  transition: .2s;
}
.nav-btn.active { color: var(--gold); }
.nav-btn .nav-icon { font-size: 20px; }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px var(--gold-glow)); }

/* ═══════════════════════════════════════════
   PAGES
═══════════════════════════════════════════ */
.page { display:none; padding: 12px 14px 0; }
.page.active { display:block; }

/* ═══════════════════════════════════════════
   SECTION LABEL
═══════════════════════════════════════════ */
.section-lbl {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt3);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-lbl::after {
  content:'';
  flex:1;
  height:1px;
  background: var(--border);
}

/* ═══════════════════════════════════════════
   WEEK VIEW - DAY CARDS
═══════════════════════════════════════════ */
.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .3s;
}
.day-card.is-today { border-color: rgba(212,168,67,.4); }
.day-card.is-today .dc-head { background: linear-gradient(90deg, rgba(212,168,67,.08), transparent); }

.dc-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 14px;
  cursor: pointer;
  min-height: 58px;
}
.dc-head:active { background: rgba(255,255,255,.03); }
.dc-left { display:flex; align-items:center; gap:10px; }
.dc-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.heavy-dot  { background: var(--red);    box-shadow: 0 0 8px rgba(248,113,113,.4); }
.light-dot  { background: var(--emerald);box-shadow: 0 0 8px rgba(52,211,153,.4); }
.free-dot   { background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,.4); }

.dc-name  { font-size:15px; font-weight:700; }
.today-badge {
  font-size:9px; font-weight:700; letter-spacing:1px;
  background: var(--gold-dim);
  color: var(--gold);
  border-radius:5px;
  padding:2px 7px;
  border: 1px solid rgba(212,168,67,.3);
}
.dc-type-badge {
  font-size:10px; font-weight:700;
  padding:3px 9px; border-radius:10px;
  letter-spacing:.5px;
}
.heavy .dc-type-badge  { background:rgba(248,113,113,.1); color:var(--red); }
.light .dc-type-badge  { background:rgba(52,211,153,.1); color:var(--emerald); }
.free-day .dc-type-badge { background:rgba(167,139,250,.1); color:var(--purple); }

.dc-right { display:flex; align-items:center; gap:8px; }
.dc-progress-txt { font-size:11px; color:var(--txt2); font-family:'DM Mono',monospace; }
.dc-chev { font-size:12px; color:var(--txt3); transition:transform .25s; }
.day-card.open .dc-chev { transform:rotate(180deg); }

/* mini progress */
.dc-bar {
  height:2px;
  background: var(--border);
  margin: 0 14px;
}
.dc-bar-fill {
  height:100%;
  background: linear-gradient(90deg, var(--gold), #FBBF24);
  transition: width .5s;
  border-radius:2px;
}

/* Day body (tasks) */
.dc-body { display:none; padding:4px 10px 12px; }
.day-card.open .dc-body { display:block; }

/* Activity pills (summary) */
.act-pills { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.act-pill {
  font-size:10px;
  padding:3px 8px;
  border-radius:8px;
  font-weight:600;
  opacity:.8;
}

/* Task row */
.task-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 8px;
  border-radius: 10px;
  margin-bottom: 4px;
  background: rgba(255,255,255,.02);
  transition: background .15s;
  min-height: 46px;
}
.task-row:active { background: rgba(255,255,255,.04); }
.task-row.done { opacity:.5; }
.task-row.done .task-name { text-decoration: line-through; color: var(--txt3); }

.task-check {
  width:26px; height:26px; min-width:26px;
  border-radius:50%;
  border: 2px solid var(--border2);
  background:none;
  display:flex; align-items:center; justify-content:center;
  font-size:13px;
  color:transparent;
  transition:.2s;
  flex-shrink:0;
}
.task-row.done .task-check {
  border-color: var(--gold);
  background: var(--gold);
  color: #000;
  animation: pop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from{transform:scale(.5)} to{transform:scale(1)} }

.task-cat-dot {
  width:7px; height:7px;
  border-radius:50%;
  flex-shrink:0;
}
.task-name { flex:1; font-size:13px; line-height:1.4; }
.task-time { font-size:11px; color:var(--txt3); font-family:'DM Mono',monospace; flex-shrink:0; }

.hw-badge {
  font-size:9px; font-weight:700;
  background: rgba(251,191,36,.15);
  color: var(--amber);
  border-radius:4px;
  padding:2px 5px;
  border:1px solid rgba(251,191,36,.25);
}
.task-del {
  background:none;
  font-size:14px;
  color:var(--txt3);
  width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  border-radius:8px;
  flex-shrink:0;
  transition:.15s;
}
.task-del:active { color:var(--red); }

/* Special note blocks */
.note-block {
  background: rgba(212,168,67,.06);
  border: 1px solid rgba(212,168,67,.15);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:8px;
  display:flex;
  align-items:flex-start;
  gap:8px;
}
.note-block-icon { font-size:16px; flex-shrink:0; }
.note-block-txt  { font-size:12px; color: rgba(212,168,67,.8); line-height:1.5; }

/* meal block */
.meal-block {
  background: rgba(110,231,183,.05);
  border: 1px solid rgba(110,231,183,.15);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:6px;
  font-size:12px;
  color: var(--food, #6EE7B7);
}

/* add form */
.add-row { display:flex; gap:8px; margin-top:8px; }
.add-task-btn {
  flex:1;
  min-height:44px;
  background:none;
  border:1.5px dashed var(--border2);
  border-radius:10px;
  font-size:13px;
  color:var(--txt3);
  transition:.2s;
}
.add-task-btn:active { border-color:var(--gold); color:var(--gold); }

.add-form {
  display:none;
  margin-top:8px;
  padding-top:12px;
  border-top:1px solid var(--border);
}
.add-form.show { display:flex; flex-direction:column; gap:8px; }
.add-form input, .add-form select {
  width:100%;
  padding:12px 14px;
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius:10px;
  color:var(--txt);
  font-size:14px;
}
.add-form input:focus, .add-form select:focus { border-color:var(--gold); }
.add-form-row { display:flex; gap:8px; }
.add-form-btns { display:flex; gap:8px; }
.btn-add-ok {
  flex:1; min-height:46px;
  background: var(--gold);
  color: #000;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
  transition:.15s;
}
.btn-add-ok:active { opacity:.85; transform:scale(.98); }
.btn-add-cancel {
  min-height:46px; padding:0 18px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius:10px;
  font-size:14px;
  color:var(--txt2);
}

/* ═══════════════════════════════════════════
   TODAY PAGE - TIMELINE
═══════════════════════════════════════════ */
.timeline { padding-top:4px; }
.timeline-block {
  display: flex;
  gap: 12px;
  margin-bottom: 6px;
}
.tl-time-col {
  width: 42px;
  flex-shrink:0;
  padding-top:14px;
  font-size:10px;
  color:var(--txt3);
  font-family:'DM Mono',monospace;
  text-align:center;
}
.tl-line-col {
  display:flex;
  flex-direction:column;
  align-items:center;
  flex-shrink:0;
  width:16px;
}
.tl-dot {
  width:10px; height:10px;
  border-radius:50%;
  border:2px solid var(--border2);
  background: var(--bg);
  flex-shrink:0;
  margin-top:16px;
  transition:.3s;
}
.tl-dot.active-dot {
  border-color: var(--gold);
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold-glow);
}
.tl-dot.done-dot {
  border-color: var(--emerald);
  background: var(--emerald);
}
.tl-line {
  width:1px;
  flex:1;
  background: var(--border);
  min-height:20px;
}
.tl-card {
  flex:1;
  background: var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
  border-left:3px solid transparent;
  transition:.2s;
  cursor:pointer;
}
.tl-card:active { background:var(--card2); }
.tl-card.done-card { opacity:.55; }
.tl-card .tl-tag {
  font-size:10px;
  font-weight:700;
  letter-spacing:.5px;
  margin-bottom:4px;
  text-transform:uppercase;
}
.tl-card .tl-name {
  font-size:14px;
  font-weight:600;
  line-height:1.35;
}
.tl-card .tl-detail {
  font-size:11px;
  color:var(--txt2);
  margin-top:4px;
  line-height:1.5;
}
.tl-card .tl-dur {
  font-size:10px;
  font-family:'DM Mono',monospace;
  color:var(--txt3);
  margin-top:6px;
}
.current-marker {
  background: rgba(212,168,67,.08);
  border-color: rgba(212,168,67,.3) !important;
}
.current-marker .tl-card { border-left-color: var(--gold) !important; }

/* Energy bar */
.energy-strip {
  display:flex; gap:3px; margin:12px 0 4px;
}
.en-seg {
  flex:1; height:4px; border-radius:2px;
}

/* ═══════════════════════════════════════════
   POMODORO PAGE
═══════════════════════════════════════════ */
.pomo-wrap {
  display:flex; flex-direction:column;
  align-items:center;
  padding-top:10px;
}
.pomo-subject-select {
  width:100%;
  padding:13px 16px;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:12px;
  color:var(--txt);
  font-size:14px;
  margin-bottom:20px;
}
.pomo-ring-wrap {
  position:relative;
  width:230px; height:230px;
  margin:0 auto 24px;
}
.pomo-ring {
  width:100%; height:100%;
  transform:rotate(-90deg);
}
.pomo-ring-bg  { fill:none; stroke:rgba(255,255,255,.06); stroke-width:10; }
.pomo-ring-fg  { fill:none; stroke:var(--gold); stroke-width:10; stroke-linecap:round;
  transition: stroke-dashoffset .5s linear, stroke .3s; }
.pomo-ring-wrap .pomo-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.pomo-time {
  font-family:'DM Mono',monospace;
  font-size:52px;
  font-weight:500;
  letter-spacing:-2px;
  color:var(--txt);
  line-height:1;
}
.pomo-mode-lbl {
  font-size:12px;
  color:var(--txt2);
  margin-top:6px;
  text-transform:uppercase;
  letter-spacing:2px;
}
.pomo-session-count {
  display:flex; gap:6px;
  margin-bottom:20px;
}
.pomo-dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,.1);
  transition:.3s;
}
.pomo-dot.filled { background:var(--gold); box-shadow:0 0 8px var(--gold-glow); }
.pomo-controls { display:flex; gap:12px; align-items:center; margin-bottom:28px; }
.pomo-btn-main {
  width:72px; height:72px;
  border-radius:50%;
  background: var(--gold);
  color:#000;
  font-size:28px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 24px var(--gold-glow);
  transition:.2s;
}
.pomo-btn-main:active { transform:scale(.94); }
.pomo-btn-secondary {
  width:48px; height:48px;
  border-radius:50%;
  background:var(--card);
  border:1px solid var(--border2);
  color:var(--txt2);
  font-size:20px;
  display:flex; align-items:center; justify-content:center;
  transition:.2s;
}
.pomo-btn-secondary:active { background:var(--card2); }
.pomo-settings { display:flex; gap:8px; }
.pomo-mode-btn {
  flex:1; padding:10px;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:10px;
  font-size:12px;
  color:var(--txt2);
  transition:.2s;
}
.pomo-mode-btn.active {
  border-color:var(--gold);
  color:var(--gold);
  background:var(--gold-dim);
}

/* Pomo log */
.pomo-log { width:100%; margin-top:20px; }
.pomo-log-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 12px;
  background:var(--card);
  border-radius:8px;
  margin-bottom:5px;
  font-size:12px;
}
.pomo-log-subject { color:var(--txt); font-weight:600; }
.pomo-log-time    { color:var(--txt2); font-family:'DM Mono',monospace; }

/* ═══════════════════════════════════════════
   EXAMS PAGE
═══════════════════════════════════════════ */
.exam-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  margin-bottom:10px;
  position:relative;
  overflow:hidden;
}
.exam-card::before {
  content:'';
  position:absolute;
  top:0; left:0; bottom:0;
  width:4px;
}
.exam-card .ec-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:12px;
}
.ec-name  { font-size:15px; font-weight:700; }
.ec-days  {
  font-family:'DM Mono',monospace;
  font-size:22px;
  font-weight:500;
}
.ec-days-lbl { font-size:10px; color:var(--txt2); margin-top:1px; }
.ec-progress { margin-bottom:10px; }
.ec-bar-wrap {
  background:rgba(255,255,255,.06);
  border-radius:4px; height:6px; overflow:hidden;
  margin-top:5px;
}
.ec-bar { height:100%; border-radius:4px; transition:width .5s; }
.ec-pct { font-size:11px; color:var(--txt2); margin-top:4px; font-family:'DM Mono',monospace; }
.ec-sessions {

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const now = new Date();
const todayIdx = now.getDay();

function weekKey(){
  const y=now.getFullYear(),s=new Date(y,0,1);
  return `ros_${y}W${Math.ceil(((now-s)/864e5+s.getDay()+1)/7)}`;
}
function todayKey(){ return `ros_h_${now.toDateString().replace(/\s/g,'_')}`; }

let lang = 'ar';
let STATE = {
  done:{}, added:{}, deleted:{}, expanded:new Set([todayIdx]),
  water:0, habits:{},
  pomo:{ sessions:[], subject:'ops', mode:'25', running:false },
  exams:{}, chapters:{},
  formDay:null,
};

function loadState(){
  try{
    const r=JSON.parse(localStorage.getItem(weekKey())||'{}');
    STATE.done    = r.done    || {};
    STATE.added   = r.added   || {};
    STATE.deleted = r.deleted || {};
    STATE.expanded= new Set(r.expanded || [todayIdx]);
    STATE.exams   = r.exams   || {};
    STATE.chapters= r.chapters|| {};
    STATE.pomo    = r.pomo    || {sessions:[],subject:'ops',mode:'25',running:false};
  }catch(e){}
  try{
    const h=JSON.parse(localStorage.getItem(todayKey())||'{}');
    STATE.water  = h.water  || 0;
    STATE.habits = h.habits || {};
  }catch(e){}
  try{ lang=localStorage.getItem('ros_lang')||'ar'; }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem(weekKey(), JSON.stringify({
      done:STATE.done, added:STATE.added, deleted:STATE.deleted,
      expanded:[...STATE.expanded], exams:STATE.exams,
      chapters:STATE.chapters, pomo:STATE.pomo,
    }));
  }catch(e){}
  try{
    localStorage.setItem(todayKey(), JSON.stringify({
      water:STATE.water, habits:STATE.habits,
    }));
  }catch(e){}
}

function L(obj){ return lang==='ar' ? (obj.ar||obj.en) : (obj.en||obj.ar); }
function dayTasks(i){
  const base=(WEEK_TPL[i]||[]).filter(t=>!STATE.deleted[t.id]).map(t=>({...t,isBase:true}));
  const extra=(STATE.added[i]||[]).map(t=>({...t,isBase:false}));
  return [...base,...extra];
}
function getSunday(){
  const s=new Date(now);
  s.setDate(now.getDate()-todayIdx);
  s.setHours(0,0,0,0);
  return s;
}
function getDay(i){ const d=new Date(getSunday());d.setDate(d.getDate()+i);return d; }

  const habHtml = HABITS_DEF.map(h=>`
    <div class="hab${STATE.habits[h.id]?' done':''}" onclick="toggleHabit('${h.id}')">
      ${h.icon} ${lang==='ar'?h.ar:h.en}${STATE.habits[h.id]?' ✓':''}
    </div>`).join('');
  document.getElementById('habitsRow').innerHTML=habHtml;

  // week progress
  const allTasks=Object.values(WEEK_TPL).flatMap((ts,i)=>
    ts.filter(t=>!STATE.deleted[t.id]).concat(STATE.added[i]||[])
  );
  const tot=allTasks.length, don=allTasks.filter(t=>STATE.done[t.id]).length;
  const pct=tot?Math.round(don/tot*100):0;
  document.getElementById('wkBar').style.width=pct+'%';

  document.getElementById('wkStats').innerHTML=`

  `;

  document.querySelectorAll('[data-ar]').forEach(el=>{

  });
}

function renderWeek(){
  const container=document.getElementById('pageWeek');
  let html='';
  const sl=lang==='ar';

  html+=`<div class="reset-strip"><button class="reset-btn" onclick="document.getElementById('resetModal').classList.add('show')">
    ${sl?'↺ إعادة تعيين الأسبوع':'↺ Reset Week'}
  </button></div>`;

  for(let i=0;i<7;i++){
    const d=getDay(i);
    const isT=d.toDateString()===now.toDateString();
    const isOpen=STATE.expanded.has(i);
    const tasks=dayTasks(i);
    const donC=tasks.filter(t=>STATE.done[t.id]).length;
    const pct=tasks.length?Math.round(donC/tasks.length*100):0;
    const dtype=DAY_TYPE[i];
    const days=lang==='ar'?DAYS_AR:DAYS_EN;
    const months=lang==='ar'?MONTHS_AR:MONTHS_EN;
    const dlbl=lang==='ar'?DLBL_AR:DLBL_EN;

    let dotClass=''; if(dtype==='heavy')dotClass='heavy-dot';else if(dtype==='light')dotClass='light-dot';else dotClass='free-dot';

    html+=`<div class="day-card ${dtype}${isT?' is-today':''}${isOpen?' open':''}" id="dc-${i}">
      <div class="dc-head" onclick="togExpand(${i})">
        <div class="dc-left">
          <div class="dc-dot ${dotClass}"></div>
          <div>
            <span class="dc-name">${days[d.getDay()]}</span>
            ${isT?`<span class="today-badge" style="margin-${lang==='ar'?'right':'left'}:6px">${sl?'• اليوم':'• Today'}</span>`:''}
          </div>
          <span class="dc-type-badge">${dlbl[i]}</span>
        </div>
        <div class="dc-right">
          ${tasks.length?`<span class="dc-progress-txt">${donC}/${tasks.length}</span>`:''}
          <span class="dc-progress-txt" style="color:var(--txt3)">${d.getDate()}/${d.getMonth()+1}</span>
          <span class="dc-chev">▾</span>
        </div>
      </div>
      <div class="dc-bar"><div class="dc-bar-fill" style="width:${pct}%"></div></div>
      <div class="dc-body">`;

    // Thu special note
    if(i===4){
      html+=`<div class="note-block">
        <span class="note-block-icon">📋</span>
        <span class="note-block-txt">${sl?'يوم الواجبات — خلّص كل الواجبات اليوم وارتاح باقي الأسبوع 💪':'HW Day — finish all assignments today and relax the rest of the week 💪'}</span>
      </div>`;
    }
    if(i===5||i===6){
      html+=`<div class="note-block">
        <span class="note-block-icon">🎬</span>
        <span class="note-block-txt">${sl?'أيام التصوير الذهبية — batch filming للمحتوى':'Golden filming days — batch your content creation'}</span>
      </div>`;
    }

    // Task rows
    tasks.forEach(tk=>{
      const isDone=!!STATE.done[tk.id];
      const cat=CAT[tk.cat]||CAT.REST;
      const name=lang==='ar'?tk.ar:tk.en;
      html+=`<div class="task-row${isDone?' done':''}" id="tr-${tk.id}">
        <button class="task-check" onclick="toggleDone('${tk.id}',${i})">${isDone?'✓':''}</button>
        <div class="task-cat-dot" style="background:${cat.color}"></div>
        <span class="task-name">${tk.hw?`<span class="hw-badge">${sl?'واجب':'HW'}</span> `:''}${name}</span>
        ${tk.time?`<span class="task-time">${tk.time}</span>`:''}
        <button class="task-del" onclick="delTask('${tk.id}',${i},${tk.isBase})">✕</button>
      </div>`;
    });

    // Add form
    if(STATE.formDay===i){
      const cats=Object.values(CAT).map(c=>`<option value="${c.key}">${c.icon} ${lang==='ar'?c.ar:c.en}</option>`).join('');
      html+=`<div class="add-form show" id="af-${i}">
        <input type="text" id="inp-${i}" placeholder="${sl?'اكتب المهمة...':'Write the task...'}" style="direction:${lang==='ar'?'rtl':'ltr'}">
        <div class="add-form-row">
          <select id="cat-${i}" style="flex:1">${cats}</select>
          <input type="time" id="tim-${i}" style="width:110px">
        </div>
        <div class="add-form-btns">
          <button class="btn-add-cancel" onclick="closeForm(${i})">${sl?'إلغاء':'Cancel'}</button>
          <button class="btn-add-ok" onclick="addTask(${i})">${sl?'إضافة':'Add'}</button>
        </div>
      </div>`;
    } else {
      html+=`<div class="add-row">
        <button class="add-task-btn" onclick="openForm(${i},event)">+ ${sl?'مهمة':'Task'}</button>
      </div>`;
    }

    html+=`</div></div>`; // close dc-body + day-card
  }

  container.innerHTML=html;

  // Focus input if form open
  if(STATE.formDay!==null){
    const inp=document.getElementById(`inp-${STATE.formDay}`);
    if(inp){inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')addTask(STATE.formDay);if(e.key==='Escape')closeForm(STATE.formDay);};}
  }
}

      const [t,n]=nutritionEntries[j];
      html+=`<div class="nutr-card">
        <div class="nutr-time">${t}</div>
        <div class="nutr-meal">${sl?n.ar:n.en}</div>
        <div class="nutr-desc">${sl?n.desc_ar:n.desc_en}</div>
      </div>`;
    }
    html+='</div>';
  }

  // Timeline
  html+=`<div class="section-lbl">${sl?'⏱ جدول اليوم':'⏱ Today\'s Schedule'}</div>
  <div class="timeline">`;

  tasks.forEach((tk,idx)=>{
    const cat=CAT[tk.cat]||CAT.REST;
    const isDone=!!STATE.done[tk.id];
    let isNow=false;
    if(tk.time){
      const [h,m]=(tk.time||'00:00').split(':').map(Number);
      const nextTk=tasks[idx+1];
      let nh=23,nm=59;
      if(nextTk&&nextTk.time){[nh,nm]=nextTk.time.split(':').map(Number);}
      isNow=(now_h*60+now_m)>=(h*60+m)&&(now_h*60+now_m)<(nh*60+nm);
    }
    const name=lang==='ar'?tk.ar:tk.en;
    const detail=lang==='ar'?tk.detail_ar:tk.detail_en;
    html+=`<div class="timeline-block${isNow?' current-marker':''}">
      <div class="tl-time-col">${tk.time||''}</div>
      <div class="tl-line-col">
        <div class="tl-dot${isDone?' done-dot':isNow?' active-dot':''}"></div>
        ${idx<tasks.length-1?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-card${isDone?' done-card':''}" style="border-left-color:${cat.color}" onclick="toggleDone('${tk.id}',${todayIdx})">
        <div class="tl-tag" style="color:${cat.color}">${cat.icon} ${lang==='ar'?cat.ar:cat.en}</div>
        <div class="tl-name">${tk.hw?`<span class="hw-badge" style="margin-${lang==='ar'?'left':'right'}:4px">${sl?'واجب':'HW'}</span>`:''}${name}</div>
        ${detail?`<div class="tl-detail">${detail}</div>`:''}
        ${tk.dur?`<div class="tl-dur mono">${tk.dur}</div>`:''}
      </div>
    </div>`;
  });

  html+=`</div>`; // close timeline

  // Gym plan
  const gp=GYM_PLAN[todayIdx];
  if(gp.ex.length>0){
    html+=`<div class="section-lbl">${sl?'💪 تمارين اليوم':'💪 Today\'s Workout'}</div>
    <div class="gym-card">
      <div class="gym-card-top">
        <span class="gym-day-lbl">${lang==='ar'?gp.type_ar:gp.type_en}</span>
        <span class="gym-type">${sl?'الوقت المناسب: 20:30':'Best time: 20:30'}</span>
      </div>
      <div class="gym-exercises">
        ${gp.ex.map(e=>`<div class="gym-ex">${lang==='ar'?e.ar:e.en}<span>${e.sets}</span></div>`).join('')}
      </div>
    </div>`;
  }

  container.innerHTML=html;
}

/* ═══════════════════════════════════════════════════
   RENDER POMODORO PAGE
═══════════════════════════════════════════════════ */
let timerInterval=null;
let timerRemaining=25*60;
let timerRunning=false;
let timerMode='25'; // '25','50','break5','break10'
let timerDone=0; // sessions done

function renderPomo(){
  const sl=lang==='ar';
  const subjOptions=SUBJECTS.map(s=>`<option value="${s.id}"${STATE.pomo.subject===s.id?' selected':''}>${lang==='ar'?s.ar:s.en}</option>`).join('');
  const modes=[
    {id:'25',label:'25/5 Pomodoro'},
    {id:'50',label:'50/10 Deep Work'},
  ];
  const sessions=STATE.pomo.sessions||[];
  const todaySessions=sessions.filter(s=>s.date===now.toDateString());
  const totalMin=todaySessions.reduce((a,s)=>a+(s.min||0),0);
  const circumference=2*Math.PI*100;
  const progress=timerRunning?(1-timerRemaining/(getCurrentModeDuration()*60)):0;
  const dash=circumference*(1-progress);

  const logHtml=todaySessions.slice(-5).reverse().map(s=>
    `<div class="pomo-log-item">
      <span class="pomo-log-subject">${s.subject||''}</span>
      <span class="pomo-log-time">${s.min}min · ${s.at}</span>
    </div>`
  ).join('');

  document.getElementById('pagePomo').innerHTML=`
  <div class="pomo-wrap">
    <div class="section-lbl">${sl?'📚 اختر المادة':'📚 Select Subject'}</div>
    <select class="pomo-subject-select" onchange="STATE.pomo.subject=this.value;saveState()">${subjOptions}</select>

    <div class="pomo-session-count">
      ${Array.from({length:4},(_,i)=>`<div class="pomo-dot${i<(timerDone%4)?' filled':''}"></div>`).join('')}
    </div>

    <div class="pomo-ring-wrap">
      <svg class="pomo-ring" viewBox="0 0 220 220">
        <circle class="pomo-ring-bg" cx="110" cy="110" r="100"/>
        <circle class="pomo-ring-fg" cx="110" cy="110" r="100"
          stroke-dasharray="${circumference}"
          stroke-dashoffset="${dash}"
          stroke="${timerMode==='break5'||timerMode==='break10'?'#34D399':'#D4A843'}"
        />
      </svg>
      <div class="pomo-inner">
        <div class="pomo-time mono" id="pomoDisplay">${fmtTime(timerRemaining)}</div>
        <div class="pomo-mode-lbl">${sl?(timerMode.startsWith('break')?'استراحة':'تركيز'):(timerMode.startsWith('break')?'Break':'Focus')}</div>
      </div>
    </div>

    <div class="pomo-controls">
      <button class="pomo-btn-secondary" onclick="resetTimer()">↩</button>
      <button class="pomo-btn-main" id="pomoPlayBtn" onclick="toggleTimer()">
        ${timerRunning?'⏸':'▶'}
      </button>
      <button class="pomo-btn-secondary" onclick="skipMode()">⏭</button>
    </div>

    <div class="pomo-settings">
      ${modes.map(m=>`<button class="pomo-mode-btn${timerMode===m.id?' active':''}" onclick="setMode('${m.id}')">${m.label}</button>`).join('')}
    </div>

    <div style="display:flex;justify-content:space-between;margin:14px 0 8px;font-size:12px;color:var(--txt2)">
      <span>${sl?'جلسات اليوم':'Today\'s sessions'}: <strong style="color:var(--txt)">${todaySessions.length}</strong></span>
      <span>${sl?'إجمالي التركيز':'Total focus'}: <strong style="color:var(--gold)">${totalMin}${sl?'د':'min'}</strong></span>
    </div>

    ${logHtml?`<div class="section-lbl">${sl?'سجل اليوم':'Today\'s Log'}</div><div class="pomo-log">${logHtml}</div>`:''}
  </div>`;
}

function getCurrentModeDuration(){
  if(timerMode==='25')return 25;
  if(timerMode==='50')return 50;
  if(timerMode==='break5')return 5;
  if(timerMode==='break10')return 10;
  return 25;
}
function fmtTime(sec){ return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`; }

function toggleTimer(){
  if(timerRunning){
    timerRunning=false;
    clearInterval(timerInterval);
  } else {
    timerRunning=true;
    timerInterval=setInterval(()=>{
      if(timerRemaining<=0){
        clearInterval(timerInterval);
        timerRunning=false;
        onTimerComplete();
      } else {
        timerRemaining--;
        updateTimerDisplay();
      }
    },1000);
  }
  renderPomo();
  updateFloatTimer();
}
function resetTimer(){
  clearInterval(timerInterval);
  timerRunning=false;
  timerRemaining=getCurrentModeDuration()*60;
  updateTimerDisplay();
  renderPomo();
  updateFloatTimer();
}
function skipMode(){
  clearInterval(timerInterval);
  timerRunning=false;
  if(timerMode==='25'){timerMode='break5';}
  else if(timerMode==='50'){timerMode='break10';}
  else{timerDone++;timerMode=STATE.pomo.mode==='50'?'50':'25';}
  timerRemaining=getCurrentModeDuration()*60;
  renderPomo();
  updateFloatTimer();
}
function setMode(m){
  timerMode=m; STATE.pomo.mode=m;
  resetTimer();
}
function onTimerComplete(){
  const dur=getCurrentModeDuration();
  if(!timerMode.startsWith('break')){
    const subj=SUBJECTS.find(s=>s.id===STATE.pomo.subject);
    const subjName=subj?(lang==='ar'?subj.ar:subj.en):'';
    if(!STATE.pomo.sessions)STATE.pomo.sessions=[];
    STATE.pomo.sessions.push({
      subject:subjName, min:dur,
      at:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
      date:now.toDateString(),
    });
    saveState();
    try{if(Notification.permission==='granted')new Notification('Session done! 🍅',{body:`${dur}min ${subjName} complete`});}catch(e){}
    // Auto-switch to break
    timerMode=dur===50?'break10':'break5';
  } else {
    timerDone++;
    timerMode=STATE.pomo.mode==='50'?'50':'25';
  }
  timerRemaining=getCurrentModeDuration()*60;
  renderPomo();
  updateFloatTimer();
}
function updateTimerDisplay(){
  const d=document.getElementById('pomoDisplay');
  if(d)d.textContent=fmtTime(timerRemaining);
  updateFloatTimer();
}
function updateFloatTimer(){
  const ft=document.getElementById('floatTimer');
  const sl=lang==='ar';
  if(timerRunning){
    ft.classList.add('show');
    document.getElementById('floatTimerTxt').textContent=fmtTime(timerRemaining);
    const subj=SUBJECTS.find(s=>s.id===STATE.pomo.subject);
    document.getElementById('floatSubj').textContent=subj?(lang==='ar'?subj.ar:subj.en):'';
  } else {
    ft.classList.remove('show');
  }
}
function goToTimer(){
  setPage('pomo', document.querySelectorAll('.nav-btn')[2]);
}

/* ═══════════════════════════════════════════════════
   RENDER EXAMS PAGE
═══════════════════════════════════════════════════ */
function renderExams(){
  const sl=lang==='ar';
  let html=`<div class="section-lbl">${sl?'📅 مواعيد الامتحانات':'📅 Exam Schedule'}</div>`;

  SUBJECTS.forEach(subj=>{
    const examDate=STATE.exams[subj.id];
    const chapDone=(STATE.chapters[subj.id]||[]).length;
    const chapPct=Math.round(chapDone/subj.chapters*100);
    let daysLeft='?',urgentColor='var(--txt2)';

    if(examDate){
      const ed=new Date(examDate);
      const diff=Math.ceil((ed-now)/(1000*60*60*24));
      daysLeft=diff>0?diff:0;
      if(diff<=3)urgentColor='var(--red)';
      else if(diff<=7)urgentColor='var(--amber)';
      else urgentColor='var(--emerald)';
    }

    // Generate chapters for this subject
    const chaps=Array.from({length:subj.chapters},(_,i)=>i+1);
    const chapHtml=chaps.map(n=>{
      const done=(STATE.chapters[subj.id]||[]).includes(n);
      return `<div class="ec-ch${done?' done':''}" onclick="toggleChapter('${subj.id}',${n})">${sl?'فصل':'Ch'} ${n}</div>`;
    }).join('');

    html+=`<div class="exam-card" style="border-left:4px solid ${subj.color};border-right:none">
      <div class="ec-header">
        <div>
          <div class="ec-name">${lang==='ar'?subj.ar:subj.en}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:3px">${sl?'فصول':'Chapters'}: ${subj.chapters} · ${sl?'مراجع':'Reviewed'}: ${chapDone}</div>
        </div>
        <div style="text-align:center">
          <div class="ec-days" style="color:${urgentColor}">${daysLeft}</div>
          <div class="ec-days-lbl">${sl?'يوم':'days'}</div>
        </div>
      </div>
      <div class="ec-progress">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt2)">
          <span>${sl?'التقدم الدراسي':'Study Progress'}</span>
          <span class="mono">${chapPct}%</span>
        </div>
        <div class="ec-bar-wrap"><div class="ec-bar" style="width:${chapPct}%;background:${subj.color}"></div></div>
      </div>
      <div class="ec-chapters">${chapHtml}</div>
      <div class="ec-date-row">
        <input type="date" class="ec-date-input" id="edate-${subj.id}" value="${examDate||''}" onchange="saveExamDate('${subj.id}')">
        <button class="ec-save" onclick="saveExamDate('${subj.id}')">${sl?'حفظ':'Save'}</button>
      </div>
    </div>`;
  });

  // SRS reminder
  html+=`<div class="section-lbl">${sl?'🧠 Spaced Repetition':'🧠 Spaced Repetition'}</div>
  <div class="srs-card">
    <div class="srs-top">
      <span class="srs-subj">${sl?'جدول المراجعة الذكي':'Smart Review Schedule'}</span>
    </div>
    <div style="font-size:12px;color:var(--txt2);line-height:1.6">
      ${sl?`راجع المادة: اليوم → بعد يوم → بعد 3 أيام → بعد أسبوع → بعد شهر
      <br>هذه الطريقة تثبّت المعلومات في الذاكرة طويلة الأمد 🧠`
      :`Review material: Today → Next day → 3 days later → 1 week → 1 month
      <br>This method locks information into long-term memory 🧠`}
    </div>
  </div>`;

  document.getElementById('pageExams').innerHTML=html;
}

/* ═══════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════ */
function toggleDone(id, dayIdx){
  STATE.done[id]=!STATE.done[id];
  saveState();
  renderHeader();
  if(activePage==='week')renderWeek();
  else if(activePage==='today')renderToday();
}
function delTask(id, dayIdx, isBase){
  if(isBase)STATE.deleted[id]=true;
  else if(STATE.added[dayIdx])STATE.added[dayIdx]=STATE.added[dayIdx].filter(t=>t.id!==id);
  delete STATE.done[id];
  saveState();
  renderHeader();
  renderWeek();
}
function togExpand(i){
  if(STATE.expanded.has(i))STATE.expanded.delete(i);
  else STATE.expanded.add(i);
  saveState();
  renderWeek();
}
function openForm(i,e){
  e&&e.stopPropagation();
  STATE.formDay=i;
  STATE.expanded.add(i);
  saveState();
  renderWeek();
}
function closeForm(i){
  STATE.formDay=null;
  renderWeek();
}
function addTask(i){
  const txt=(document.getElementById(`inp-${i}`)?.value||'').trim();
  if(!txt)return;
  const cat=document.getElementById(`cat-${i}`)?.value||'STUDY';
  const time=document.getElementById(`tim-${i}`)?.value||'';
  if(!STATE.added[i])STATE.added[i]=[];
  STATE.added[i].push({id:'u'+Date.now(),ar:txt,en:txt,cat,time,isBase:false});
  STATE.formDay=null;
  saveState();
  renderHeader();
  renderWeek();
}
function toggleHabit(id){
  STATE.habits[id]=!STATE.habits[id];
  saveState();
  renderHeader();
}
function addWater(idx){
  STATE.water=idx>=STATE.water?idx+1:idx;
  if(STATE.water>8)STATE.water=0;
  saveState();
  renderToday();
}
function toggleChapter(subjId,n){
  if(!STATE.chapters[subjId])STATE.chapters[subjId]=[];
  const arr=STATE.chapters[subjId];
  const i=arr.indexOf(n);
  if(i>=0)arr.splice(i,1);else arr.push(n);
  saveState();
  renderExams();
}
function saveExamDate(subjId){
  const el=document.getElementById(`edate-${subjId}`);
  if(el)STATE.exams[subjId]=el.value;
  saveState();
  renderExams();
}
function doReset(){
  STATE.done={};STATE.added={};STATE.deleted={};
  STATE.water=0;STATE.habits={};
  STATE.pomo.sessions=[];
  STATE.expanded=new Set([todayIdx]);
  STATE.formDay=null;
  saveState();
  closeModal();
  renderAll();
}
function closeModal(){ document.getElementById('resetModal').classList.remove('show'); }
function toggleLang(){
  lang=lang==='ar'?'en':'ar';
  try{localStorage.setItem('ros_lang',lang);}catch(e){}
  document.body.className=lang==='ar'?'rtl':'ltr';
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  renderAll();
}

/* ═══════════════════════════════════════════════════
   PAGE NAVIGATION
═══════════════════════════════════════════════════ */
let activePage='week';
function setPage(name, btn){
  activePage=name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page${name.charAt(0).toUpperCase()+name.slice(1)}`).classList.add('active');
  btn.classList.add('active');
  if(name==='week')renderWeek();
  else if(name==='today')renderToday();
  else if(name==='pomo')renderPomo();
  else if(name==='exams')renderExams();
}

function renderAll(){
  renderHeader();
  if(activePage==='week')renderWeek();
  else if(activePage==='today')renderToday();
  else if(activePage==='pomo')renderPomo();
  else if(activePage==='exams')renderExams();
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
loadState();
document.body.className=lang==='ar'?'rtl':'ltr';
document.documentElement.lang=lang;
document.documentElement.dir=lang==='ar'?'rtl':'ltr';
timerRemaining=getCurrentModeDuration()*60;
renderAll();

// Auto-scroll to today in week view
setTimeout(()=>{
  const el=document.querySelector('.day-card.is-today');
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
},200);

// Notification permission
try{if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();}catch(e){}
</script>
